name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - fix/v6-followup-remediation-blockers
      - fix/v6-followup-remediation
      - fix/v6-audit-remediation-p0

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Single simulation
        run: npm run simulate

      - name: Batch simulation
        run: npm run simulate:batch

      - name: Whitespace check
        run: git diff --check
